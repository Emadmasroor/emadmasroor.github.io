E83_S24:
  title: Fluid Mechanics
  year: 2024
  semester: Spring
  level: senior
  institution: Swarthmore
  cross: null
  catalog_entry: > 
        Fluid mechanics is treated as a special case of continuum mechanics in the analysis of fluid flow systems. 
        Conservation of mass, momentum, and energy are covered along with applications to the study of 
        inviscid and viscous, incompressible, and compressible fluids.

E41_F23:
  title: Thermofluid Mechanics
  year: 2023
  semester: Fall
  level: junior
  institution: Swarthmore
  cross: null
  catalog_entry: > 
        This course introduces macroscopic thermodynamics: first and second laws, properties of pure substances, 
        and applications using system and control volume formulation. Also introduced is fluid mechanics: 
        development of conservation theorems, hydrostatics, and the dynamics of one-dimensional fluid motion with and without friction. 

E41_F23:
  title: Numerical Methods for Engineering Applications
  year: 2023
  semester: Fall
  level: sophomore
  institution: Swarthmore
  cross: Math 024
  catalog_entry: > 
        This course is geared towards students who want to know how to transform a set of equations on a page into 
        a working computer program. Potential topics include root finding, discrete and continuous optimization, 
        gradient descent, solution of linear systems, finite element methods, and machine learning. We will also discuss 
        how real numbers are represented by computers, especially insofar as they affect precision and accuracy of calculations. 
        Techniques will be applied in a series of projects focused on engineering applications.


ME_S22:
  title: Fluid Mechanics
  year: 2022
  semester: Spring
  level: junior
  institution: Virginia Tech
  cross: null
  catalog_entry: > 
        Comprehensive first course in basic and applied fluid mechanics. Fluid properties, statics, kinematics, 
        and dynamics. Eulers and Bernoullis equations. Hydrodynamics. Dimensional analysis and similitude. 
        Real fluids, laminar and turbulent flows. Boundary layer model and approximate analysis. Compressible 
        flow and propulsion devices. Flow measurement. Introduction to turbomachinery with applications.
